<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workout Tracker</title>
    <!-- Jalaali Date Library -->
    <script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.js"></script>
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ff9800;
            --border-radius: 12px;
            --worked-out-bg: #2e7d32;
            --selected-border: #ff9800;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            line-height: 1.6;
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 30px; }
        h1, h2, h3 { color: var(--accent-color); text-align: center; margin: 10px 0; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* Calendar Styles */
        .calendar-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .calendar-header button {
            background: #333; color: white; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center;
        }
        .calendar-wrapper { direction: rtl; } 
        
        .weekday { font-size: 11px; color: #aaa; font-weight: bold; padding-bottom: 5px; }
        .day {
            background-color: #262626; padding: 8px 0; border-radius: 6px; font-size: 14px; cursor: pointer; border: 2px solid transparent;
        }
        .day.selected { border: 2px solid var(--selected-border); }
        .day.has-data { background-color: var(--worked-out-bg); color: white; font-weight: bold; }

        /* Routine Selector & Inputs */
        .routine-selector { display: flex; justify-content: space-between; gap: 8px; margin: 15px 0; }
        .routine-btn {
            flex: 1; background-color: #333; color: white; border: none; padding: 10px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px;
        }
        .routine-btn.active { background-color: var(--accent-color); color: black; }

        .weight-input-group {
            display: flex; justify-content: space-between; align-items: center; background: #262626; padding: 10px; border-radius: 8px; margin-bottom: 15px;
        }
        .weight-input-group input { width: 80px; text-align: center; }

        /* Sets Table */
        .exercise-card { background-color: #262626; border-radius: 8px; padding: 12px; margin-bottom: 12px; border-left: 4px solid var(--accent-color); }
        .ex-header { display: flex; flex-direction: column; margin-bottom: 10px; }
        .ex-title { font-weight: bold; font-size: 15px; }
        .ex-target { font-size: 12px; color: #aaa; margin-top: 3px; }
        .pr-info { font-size: 11px; color: var(--accent-color); font-weight: bold; margin-top: 3px; }
        
        .set-row { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 8px; align-items: center; margin-bottom: 6px; }
        .set-row span { font-size: 12px; color: #ccc; }
        input[type="number"] {
            background-color: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; text-align: center; width: 100%; box-sizing: border-box; font-family: Arial;
        }

        .ex-note {
            font-size: 11px; color: #888; text-align: center; margin-top: 10px; font-style: italic; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 5px;
        }

        .btn-main { background-color: var(--accent-color); color: black; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }

        #loading { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: var(--accent-color); padding: 5px 10px; border-radius: 5px; font-size: 12px; display: none; z-index: 1000;}
        
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 20px;}
    </style>
</head>
<body>

    <div class="container">
        <div id="loading">⏳ Syncing...</div>
        
        <h3>🗓️ Training Calendar</h3>
        
        <div class="card calendar-wrapper">
            <div class="calendar-header">
                <button onclick="changeMonth(1)">▶</button>
                <span id="calendar-month-year" style="font-weight: bold;"></span>
                <button onclick="changeMonth(-1)">◀</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="card">
            <h2 id="selected-date-title">No Date Selected</h2>
            
            <div class="weight-input-group">
                <label style="font-weight: bold; font-size: 14px;">⚖️ Body Weight (kg):</label>
                <input type="number" id="daily-body-weight" step="0.1" placeholder="e.g. 76.5">
            </div>

            <p style="text-align: center; font-size: 13px; color: #aaa; margin: 0;">Select Routine:</p>
            <div class="routine-selector">
                <button class="routine-btn" id="btn-push" onclick="selectRoutine('push')">Push</button>
                <button class="routine-btn" id="btn-pull" onclick="selectRoutine('pull')">Pull</button>
                <button class="routine-btn" id="btn-legs" onclick="selectRoutine('legs')">Legs</button>
                <button class="routine-btn" id="btn-rest" onclick="selectRoutine('rest')">Rest / Clear</button>
            </div>
        </div>

        <div id="workout-section" style="display: none;">
            <div class="card">
                <h2 id="section-workout-title">🏋️ Workout Details</h2>
                <div id="exercises-container"></div>
                <button class="btn-main" id="btn-save-main" onclick="saveTodayWorkout()">💾 Save Daily Workout</button>
            </div>
        </div>

        <div class="card">
            <h2>📈 Body Weight (Tir - Shahrivar)</h2>
            <div class="chart-container">
                <canvas id="weightChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBC_NPNDbO0E9SMROfMlmlgYh54Eb_YpJs",
            authDomain: "workouttracker-bee8d.firebaseapp.com",
            projectId: "workouttracker-bee8d",
            storageBucket: "workouttracker-bee8d.firebasestorage.app",
            messagingSenderId: "759044419558",
            appId: "1:759044419558:web:af645ff69336f3a102f027"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // برنامه تمرینی جدید با نکات
        const workoutData = {
            push: [
                {id: 'bb_bench', name: 'Barbell Bench Press', sets: 4, target: '6-10 reps', type: 'weight-rep', note: 'Heavy load, touch chest lightly.'},
                {id: 'inc_db_press', name: 'Incline Dumbbell Press', sets: 3, target: '10-12 reps', type: 'weight-rep', note: 'Focus on upper chest volume.'},
                {id: 'arnold_press', name: 'Dumbbell Arnold Press', sets: 3, target: '10 reps', type: 'weight-rep', note: 'Full rotation for shoulder width.'},
                {id: 'lat_raise', name: 'Lateral Raises (Dumbbell)', sets: 4, target: '15 reps', type: 'weight-rep', note: 'Strict form, no swinging.'},
                {id: 'tricep_push', name: 'Cable Tricep Pushdowns', sets: 3, target: '12-15 reps', type: 'weight-rep', note: 'Squeeze at the bottom.'},
                {id: 'bench_dips', name: 'Bench Dips', sets: 3, target: 'Failure', type: 'rep-only', note: 'Great for tricep endurance.'}
            ],
            pull: [
                {id: 'lat_pull', name: 'Lat Pulldown', sets: 4, target: '10 reps', type: 'weight-rep', note: 'Pull with elbows, not hands.'},
                {id: 'db_row', name: 'One-Arm Dumbbell Row', sets: 3, target: '10 reps', type: 'weight-rep', note: 'Stretch the lat at the bottom.'},
                {id: 'facepull', name: 'Face Pulls (Cable)', sets: 3, target: '15 reps', type: 'weight-rep', note: 'Pull to face, hold for 1 sec.'},
                {id: 'db_pullover', name: 'Dumbbell Pullover', sets: 3, target: '12 reps', type: 'weight-rep', note: 'Expand the ribcage, slow tempo.'},
                {id: 'ez_curl', name: 'EZ-Bar Bicep Curls', sets: 3, target: '10-12 reps', type: 'weight-rep', note: 'Squeeze biceps hard at top.'},
                {id: 'hammer_curl', name: 'Hammer Curls', sets: 3, target: '12 reps', type: 'weight-rep', note: 'Improves grip and arm thickness.'}
            ],
            legs: [
                {id: 'bb_squat', name: 'Barbell Back Squat', sets: 4, target: '8-10 reps', type: 'weight-rep', note: 'Deep reps, chest up.'},
                {id: 'db_lunges', name: 'Dumbbell Lunges', sets: 3, target: '12/leg reps', type: 'weight-rep', note: 'Boosts balance and endurance.'},
                {id: 'db_leg_curl', name: 'Dumbbell Leg Curls', sets: 3, target: '12-15 reps', type: 'weight-rep', note: 'Control weight on the way down.'},
                {id: 'calf_raise', name: 'Standing Calf Raises', sets: 4, target: '20 reps', type: 'weight-rep', note: 'Full stretch at the bottom.'},
                {id: 'lying_leg_raise', name: 'Lying Leg Raises', sets: 3, target: '15-20 reps', type: 'rep-only', note: 'Don’t let feet touch the floor.'},
                {id: 'plank', name: 'Plank', sets: 3, target: 'Max', type: 'time', note: 'Total core stability.'}
            ]
        };

        const monthNames = ["فروردین", "اردیبهشت", "خرداد", "تیر", "مرداد", "شهریور", "مهر", "آبان", "آذر", "دی", "بهمن", "اسفند"];
        
        let todayG = new Date();
        let todayJ = jalaali.toJalaali(todayG.getFullYear(), todayG.getMonth() + 1, todayG.getDate());
        
        let viewYear = todayJ.jy;
        let viewMonth = todayJ.jm;
        
        let selectedDateStr = `${todayJ.jy}-${String(todayJ.jm).padStart(2,'0')}-${String(todayJ.jd).padStart(2,'0')}`;
        let currentRoutine = '';
        let globalPrs = {};
        let savedDatesList = [];
        let weightChartInstance = null;

        window.onload = async () => {
            showLoading(true);
            await fetchAllData();
            renderCalendar();
            await selectDate(todayJ.jy, todayJ.jm, todayJ.jd);
            renderChart();
            showLoading(false);
        };

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }

        async function recalculatePRs() {
            let newPrs = {};
            try {
                const logsSnapshot = await getDocs(collection(db, "daily_logs"));
                logsSnapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.exercises) {
                        for (const [exId, sets] of Object.entries(data.exercises)) {
                            let exType = 'weight-rep'; 
                            for(const cat in workoutData) {
                                const found = workoutData[cat].find(e => e.id === exId);
                                if(found) exType = found.type;
                            }

                            sets.forEach(set => {
                                if (exType === 'time') {
                                    const totalSec = (parseFloat(set.min) || 0) * 60 + (parseFloat(set.sec) || 0);
                                    if (totalSec > (newPrs[exId] || 0)) newPrs[exId] = totalSec;
                                } else if (exType === 'rep-only') {
                                    const r = parseFloat(set.r) || 0;
                                    if (r > (newPrs[exId] || 0)) newPrs[exId] = r;
                                } else {
                                    const w = parseFloat(set.w) || 0;
                                    if (w > (newPrs[exId] || 0)) newPrs[exId] = w;
                                }
                            });
                        }
                    }
                });
                
                globalPrs = newPrs;
                await setDoc(doc(db, "totals", "prs"), globalPrs);
            } catch(e) { console.error("Error recalculating PRs:", e); }
        }

        async function fetchAllData() {
            try {
                const prSnap = await getDoc(doc(db, "totals", "prs"));
                if (prSnap.exists()) globalPrs = prSnap.data();

                const logsSnapshot = await getDocs(collection(db, "daily_logs"));
                savedDatesList = [];
                window.weightHistory = [];

                logsSnapshot.forEach(doc => {
                    savedDatesList.push(doc.id);
                    const data = doc.data();
                    if(data.bodyWeight) {
                        window.weightHistory.push({ date: doc.id, weight: parseFloat(data.bodyWeight) });
                    }
                });
            } catch (e) { console.error(e); }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('calendar-month-year');
            grid.innerHTML = '';
            title.innerText = `${monthNames[viewMonth - 1]} ${viewYear}`;

            const weekdays = ['ش', 'ی', 'د', 'س', 'چ', 'پ', 'ج'];
            weekdays.forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);

            const gFirstDay = jalaali.toGregorian(viewYear, viewMonth, 1);
            const firstDayIndex = (new Date(gFirstDay.gy, gFirstDay.gm - 1, gFirstDay.gd).getDay() + 1) % 7; 

            let totalDays = viewMonth <= 6 ? 31 : 30;
            if (viewMonth === 12) totalDays = jalaali.isLeapJalaaliYear(viewYear) ? 30 : 29;

            for (let i = 0; i < firstDayIndex; i++) grid.innerHTML += `<div></div>`;

            for (let d = 1; d <= totalDays; d++) {
                const dateStr = `${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let classes = 'day';
                
                if (savedDatesList.includes(dateStr)) classes += ' has-data';
                if (dateStr === selectedDateStr) classes += ' selected';

                grid.innerHTML += `<div class="${classes}" onclick="window.selectDate(${viewYear},${viewMonth},${d})">${d}</div>`;
            }
        }

        window.changeMonth = (dir) => {
            viewMonth += dir;
            if (viewMonth > 12) { viewMonth = 1; viewYear++; }
            if (viewMonth < 1) { viewMonth = 12; viewYear--; }
            renderCalendar();
        };

        window.selectDate = async (y, m, d) => {
            selectedDateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            document.getElementById('selected-date-title').innerText = `Date: ${y}/${m}/${d}`;
            
            renderCalendar();
            showLoading(true);
            
            document.querySelectorAll('.routine-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('workout-section').style.display = 'none';
            document.getElementById('daily-body-weight').value = '';
            currentRoutine = '';

            try {
                const daySnap = await getDoc(doc(db, "daily_logs", selectedDateStr));
                if (daySnap.exists()) {
                    const dayData = daySnap.data();
                    if(dayData.bodyWeight) document.getElementById('daily-body-weight').value = dayData.bodyWeight;
                    if (dayData.routine) selectRoutine(dayData.routine, dayData.exercises);
                }
            } catch (e) { console.error(e); }
            showLoading(false);
        };

        window.selectRoutine = (routineType, savedExercises = null) => {
            currentRoutine = routineType;
            document.querySelectorAll('.routine-btn').forEach(b => b.classList.remove('active'));
            
            const activeBtn = document.getElementById(`btn-${routineType}`);
            if (activeBtn) activeBtn.classList.add('active');

            const container = document.getElementById('exercises-container');
            container.innerHTML = '';
            document.getElementById('workout-section').style.display = 'block';

            if (routineType === 'rest') {
                container.innerHTML = '<p style="text-align:center; color:#aaa; margin: 20px 0;">Rest Day selected. Click the button below to clear any saved exercises for this day and reset calendar color.</p>';
                document.getElementById('btn-save-main').innerText = '🔄 Clear Day / Save Rest';
                return;
            }

            document.getElementById('btn-save-main').innerText = '💾 Save Daily Workout';
            const exercises = workoutData[routineType] || [];

            exercises.forEach(ex => {
                let setInputsHtml = '';
                const savedSets = savedExercises && savedExercises[ex.id] ? savedExercises[ex.id] : [];
                const currentPr = globalPrs[ex.id] || 0;

                let prText = `🏆 PR: ${currentPr} kg`;
                if(ex.type === 'rep-only') prText = `🏆 PR: ${currentPr} reps`;
                if(ex.type === 'time') {
                    const m = Math.floor(currentPr / 60);
                    const s = currentPr % 60;
                    prText = `🏆 PR: ${m}m ${s}s`;
                }

                for (let s = 1; s <= ex.sets; s++) {
                    if (ex.type === 'time') {
                        const savedMin = savedSets[s-1]?.min || '';
                        const savedSec = savedSets[s-1]?.sec || '';
                        setInputsHtml += `
                            <div class="set-row">
                                <span>Set ${s}</span>
                                <input type="number" id="min-${ex.id}-${s}" placeholder="min" value="${savedMin}">
                                <input type="number" id="sec-${ex.id}-${s}" placeholder="sec" value="${savedSec}">
                            </div>
                        `;
                    } else if (ex.type === 'rep-only') {
                        const savedR = savedSets[s-1]?.r || '';
                        setInputsHtml += `
                            <div class="set-row">
                                <span>Set ${s}</span>
                                <div style="text-align:center; color:#666; font-size:12px;">Bodyweight</div>
                                <input type="number" id="r-${ex.id}-${s}" placeholder="reps" value="${savedR}">
                            </div>
                        `;
                    } else {
                        const savedW = savedSets[s-1]?.w || '';
                        const savedR = savedSets[s-1]?.r || '';
                        setInputsHtml += `
                            <div class="set-row">
                                <span>Set ${s}</span>
                                <input type="number" id="w-${ex.id}-${s}" placeholder="kg" value="${savedW}">
                                <input type="number" id="r-${ex.id}-${s}" placeholder="reps" value="${savedR}">
                            </div>
                        `;
                    }
                }

                container.innerHTML += `
                    <div class="exercise-card">
                        <div class="ex-header">
                            <span class="ex-title">${ex.name}</span>
                            <span class="ex-target">🎯 Target: ${ex.target}</span>
                            <span class="pr-info">${prText}</span>
                        </div>
                        ${setInputsHtml}
                        <div class="ex-note">💡 Focus: ${ex.note}</div>
                    </div>
                `;
            });
        };

        window.saveTodayWorkout = async () => {
            showLoading(true);

            if (currentRoutine === 'rest') {
                try {
                    await deleteDoc(doc(db, "daily_logs", selectedDateStr));
                    await recalculatePRs(); 
                    await fetchAllData();
                    renderCalendar();
                    renderChart();
                    document.getElementById('daily-body-weight').value = '';
                    document.getElementById('workout-section').style.display = 'none';
                    document.querySelectorAll('.routine-btn').forEach(b => b.classList.remove('active'));
                    alert('Day data cleared and PRs updated! 🔄');
                } catch(e) { alert('Error clearing data.'); }
                showLoading(false);
                return;
            }

            let logData = {
                routine: currentRoutine,
                bodyWeight: document.getElementById('daily-body-weight').value || null,
                exercises: {}
            };

            const exercises = workoutData[currentRoutine] || [];

            exercises.forEach(ex => {
                logData.exercises[ex.id] = [];
                for (let s = 1; s <= ex.sets; s++) {
                    if (ex.type === 'time') {
                        const min = document.getElementById(`min-${ex.id}-${s}`).value;
                        const sec = document.getElementById(`sec-${ex.id}-${s}`).value;
                        if (min || sec) logData.exercises[ex.id].push({ min: min, sec: sec });
                    } else if (ex.type === 'rep-only') {
                        const r = document.getElementById(`r-${ex.id}-${s}`).value;
                        if (r) logData.exercises[ex.id].push({ r: r });
                    } else {
                        const w = document.getElementById(`w-${ex.id}-${s}`).value;
                        const r = document.getElementById(`r-${ex.id}-${s}`).value;
                        if (w || r) logData.exercises[ex.id].push({ w: w, r: r });
                    }
                }
            });

            try {
                await setDoc(doc(db, "daily_logs", selectedDateStr), logData);
                await recalculatePRs(); 
                await fetchAllData(); 
                renderCalendar();
                renderChart();

                alert('Workout Details & Weight Saved! 💪');
            } catch (e) { alert('Error saving data.'); console.error(e); }
            showLoading(false);
        };

        function renderChart() {
            // ساخت بازه ثابت تابستان: از ۱ تیر (ماه ۴) تا ۳۱ شهریور (ماه ۶)
            const labels = [];
            const dataPoints = [];
            const targetYear = todayJ.jy; // سال شمسی جاری

            for (let m = 4; m <= 6; m++) {
                for (let d = 1; d <= 31; d++) {
                    const dateStr = `${targetYear}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    
                    // فقط روزهایی مثل 04/01 و 04/10 روی نمودار نوشته می‌شن تا شلوغ نشه
                    if (d === 1 || d === 15 || d === 31) {
                        labels.push(`${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`);
                    } else {
                        labels.push(''); // مخفی کردن نوشته‌های اضافی محور افقی
                    }
                    
                    const entry = window.weightHistory.find(item => item.date === dateStr);
                    dataPoints.push(entry ? entry.weight : null);
                }
            }

            const ctx = document.getElementById('weightChart').getContext('2d');
            if (weightChartInstance) weightChartInstance.destroy();

            weightChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Body Weight (kg)',
                        data: dataPoints,
                        borderColor: '#ff9800',
                        backgroundColor: 'rgba(255, 152, 0, 0.2)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#ff9800',
                        pointRadius: 3,
                        spanGaps: true, 
                        tension: 0.2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#e0e0e0' } } },
                    scales: {
                        x: { 
                            ticks: { 
                                color: '#aaa',
                                maxRotation: 0,
                                autoSkip: false
                            }, 
                            grid: { color: '#333', display: false } 
                        },
                        y: { 
                            min: 68, 
                            max: 80, 
                            ticks: { color: '#aaa' }, 
                            grid: { color: '#333' } 
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
