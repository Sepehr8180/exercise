<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفترچه تمرین دیجیتال</title>
    <script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ff9800;
            --border-radius: 12px;
            --today-bg: #2e7d32;
            --selected-bg: #ff9800;
        }
        
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            line-height: 1.6;
        }

        .container { max-width: 600px; margin: 0 auto; }
        h1, h2, h3 { color: var(--accent-color); text-align: center; margin: 10px 0; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* استایل تقویم */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-header button {
            background: #333; color: white; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .weekday { font-size: 11px; color: #aaa; font-weight: bold; padding-bottom: 5px; }
        .day {
            background-color: #262626;
            padding: 8px 0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .day.today { background-color: var(--today-bg); color: white; font-weight: bold; }
        .day.selected { border: 2px solid var(--selected-bg); }
        .day.has-data { border-bottom: 3px solid #2196f3; }

        /* انتخاب نوع برنامه */
        .routine-selector {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            margin: 15px 0;
        }
        .routine-btn {
            flex: 1; background-color: #333; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .routine-btn.active { background-color: var(--accent-color); color: black; }

        /* جدول ست‌ها */
        .exercise-card {
            background-color: #262626;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            border-right: 4px solid var(--accent-color);
        }
        .ex-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; font-size: 14px;}
        .pr-info { font-size: 11px; color: #aaa; }
        
        .set-row {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 6px;
        }
        .set-row span { font-size: 12px; color: #ccc; text-align: center; }
        input[type="number"] {
            background-color: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; text-align: center; width: 100%; box-sizing: border-box;
        }

        .btn-main {
            background-color: var(--accent-color); color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px;
        }

        #loading {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: var(--accent-color); padding: 5px 10px; border-radius: 5px; font-size: 12px; display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading">⏳ دیتابیس...</div>
        
        <h3>🗓️ انتخاب تاریخ و مدیریت تمرین</h3>
        
        <div class="card">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀ ماه قبل</button>
                <span id="calendar-month-year" style="font-weight: bold;"></span>
                <button onclick="changeMonth(1)">ماه بعد ▶</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                </div>
        </div>

        <div class="card">
            <h2 id="selected-date-title">تاریخی انتخاب نشده</h2>
            <p style="text-align: center; font-size: 13px; color: #aaa; margin: 0;">امروز چه برنامه‌ای داری؟</p>
            <div class="routine-selector">
                <button class="routine-btn" id="btn-push" onclick="selectRoutine('push')">فشار (Push)</button>
                <button class="routine-btn" id="btn-pull" onclick="selectRoutine('pull')">کشش (Pull)</button>
                <button class="routine-btn" id="btn-legs" onclick="selectRoutine('legs')">پا (Legs)</button>
                <button class="routine-btn" id="btn-rest" onclick="selectRoutine('rest')">استراحت</button>
            </div>
        </div>

        <div id="workout-section" style="display: none;">
            <div class="card">
                <h2>🏋️ لیست حرکات و ثبت ست‌ها</h2>
                <div id="exercises-container"></div>
                <button class="btn-main" onclick="saveTodayWorkout()">💾 ثبت نهایی تمرین این روز</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // تنظیمات فایربیس شما
        const firebaseConfig = {
            apiKey: "AIzaSyBC_NPNDbO0E9SMROfMlmlgYh54Eb_YpJs",
            authDomain: "workouttracker-bee8d.firebaseapp.com",
            projectId: "workouttracker-bee8d",
            storageBucket: "workouttracker-bee8d.firebasestorage.app",
            messagingSenderId: "759044419558",
            appId: "1:759044419558:web:af645ff69336f3a102f027"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ساختار اطلاعات تمرینات
        const workoutData = {
            push: [
                {id: 'benchpress', name: 'پرس سینه هالتر', sets: 4},
                {id: 'incline_db', name: 'پرس بالاسینه دمبل', sets: 3},
                {id: 'chest_fly', name: 'قفسه سینه دستگاه', sets: 3},
                {id: 'shoulder_press', name: 'پرس سرشانه دمبل', sets: 3},
                {id: 'lat_raise', name: 'نشر جانب دمبل', sets: 4},
                {id: 'tricep_push', name: 'پشت بازو سیم‌کش', sets: 3}
            ],
            pull: [
                {id: 'pullup', name: 'بارفیکس / لت سیم‌کش', sets: 4},
                {id: 'barbell_row', name: 'زیربغل هالتر خم', sets: 3},
                {id: 'cable_row', name: 'قایقی سیم‌کش', sets: 3},
                {id: 'facepull', name: 'فیس‌پول', sets: 3},
                {id: 'bb_curl', name: 'جلو بازو هالتر', sets: 3},
                {id: 'hammer_curl', name: 'جلو بازو دمبل چکشی', sets: 3}
            ],
            legs: [
                {id: 'squat', name: 'اسکوات با هالتر', sets: 4},
                {id: 'leg_press', name: 'پرس پا دستگاه', sets: 3},
                {id: 'leg_curl', name: 'پشت ران دستگاه', sets: 3},
                {id: 'leg_ext', name: 'جلو ران دستگاه', sets: 3},
                {id: 'calf_raise', name: 'ساق پا ایستاده', sets: 4},
                {id: 'crunch', name: 'کرانچ شکم', sets: 3}
            ]
        };

        const monthNames = ["فروردین", "اردیبهشت", "خرداد", "تیر", "مرداد", "شهریور", "مهر", "آبان", "آذر", "دی", "بهمن", "اسفند"];
        
        // وضعیت فعلی برنامه
        let todayG = new Date();
        let todayJ = jalaali.toJalaali(todayG.getFullYear(), todayG.getMonth() + 1, todayG.getDate());
        
        let viewYear = todayJ.jy;
        let viewMonth = todayJ.jm;
        
        let selectedDateStr = `${todayJ.jy}-${String(todayJ.jm).padStart(2,'0')}-${String(todayJ.jd).padStart(2,'0')}`;
        let currentRoutine = '';
        let globalPrs = {};

        // لود اولیه سیستم
        window.onload = async () => {
            await loadPRs();
            renderCalendar();
            await selectDate(todayJ.jy, todayJ.jm, todayJ.jd);
        };

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // دریافت بهترین رکوردها (PR)
        async function loadPRs() {
            try {
                const prSnap = await getDoc(doc(db, "totals", "prs"));
                if (prSnap.exists()) globalPrs = prSnap.data();
            } catch (e) { console.error(e); }
        }

        // رندر کردن گرافیکی تقویم
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('calendar-month-year');
            grid.innerHTML = '';
            title.innerText = `${monthNames[viewMonth - 1]} ${viewYear}`;

            // روزهای هفته
            const weekdays = ['ش', 'ی', 'د', 'س', 'چ', 'پ', 'ج'];
            weekdays.forEach(w => grid.innerHTML += `<div class="weekday">${w}</div>`);

            // محاسبه اولین روز ماه در هفته
            const gFirstDay = jalaali.toGregorian(viewYear, viewMonth, 1);
            const firstDayIndex = (new Date(gFirstDay.gy, gFirstDay.gm - 1, gFirstDay.gd).getDay() + 1) % 7; 

            // تعداد روزهای ماه
            let totalDays = viewMonth <= 6 ? 31 : 30;
            if (viewMonth === 12) totalDays = jalaali.isLeapJalaaliYear(viewYear) ? 30 : 29;

            // فضاهای خالی اول ماه
            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div></div>`;
            }

            // ساخت روزها
            for (let d = 1; d <= totalDays; d++) {
                const dateStr = `${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let classes = 'day';
                if (viewYear === todayJ.jy && viewMonth === todayJ.jm && d === todayJ.jd) classes += ' today';
                if (dateStr === selectedDateStr) classes += ' selected';

                grid.innerHTML += `<div class="${classes}" id="day-${d}" onclick="window.selectDate(${viewYear},${viewMonth},${d})">${d}</div>`;
            }
        }

        window.changeMonth = (dir) => {
            viewMonth += dir;
            if (viewMonth > 12) { viewMonth = 1; viewYear++; }
            if (viewMonth < 1) { viewMonth = 12; viewYear--; }
            renderCalendar();
        };

        // انتخاب یک روز خاص روی تقویم
        window.selectDate = async (y, m, d) => {
            selectedDateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            document.getElementById('selected-date-title').innerText = `تاریخ: ${y}/${m}/${d}`;
            
            renderCalendar();
            showLoading(true);
            
            // پاک کردن استایل دکمه‌های قبلی
            document.querySelectorAll('.routine-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('workout-section').style.display = 'none';
            currentRoutine = '';

            try {
                // دریافت سابقه روز انتخابی از دیتابیس
                const daySnap = await getDoc(doc(db, "daily_logs", selectedDateStr));
                if (daySnap.exists()) {
                    const dayData = daySnap.exists() ? daySnap.data() : {};
                    if (dayData.routine) {
                        selectRoutine(dayData.routine, dayData.exercises);
                    }
                }
            } catch (e) { console.error(e); }
            showLoading(false);
        };

        // انتخاب نوع برنامه (فشار، کشش، پا، استراحت)
        window.selectRoutine = (routineType, savedExercises = null) => {
            currentRoutine = routineType;
            document.querySelectorAll('.routine-btn').forEach(b => b.classList.remove('active'));
            
            const activeBtn = document.getElementById(`btn-${routineType}`);
            if (activeBtn) activeBtn.classList.add('active');

            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            if (routineType === 'rest') {
                document.getElementById('workout-section').style.display = 'none';
                return;
            }

            document.getElementById('workout-section').style.display = 'block';
            const exercises = workoutData[routineType] || [];

            exercises.forEach(ex => {
                let setInputsHtml = '';
                const savedSets = savedExercises && savedExercises[ex.id] ? savedExercises[ex.id] : [];
                const currentPr = globalPrs[ex.id] || 0;

                for (let s = 1; s <= ex.sets; s++) {
                    const savedW = savedSets[s-1]?.w || '';
                    const savedR = savedSets[s-1]?.r || '';
                    
                    setInputsHtml += `
                        <div class="set-row">
                            <span>ست ${s}</span>
                            <input type="number" id="w-${ex.id}-${s}" placeholder="وزن" value="${savedW}">
                            <input type="number" id="r-${ex.id}-${s}" placeholder="تکرار" value="${savedR}">
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="exercise-card">
                        <div class="ex-header">
                            <span>${ex.name}</span>
                            <span class="pr-info">رکورد کلی: ${currentPr}kg</span>
                        </div>
                        ${setInputsHtml}
                    </div>
                `;
            });
        };

        // ذخیره نهایی کل اطلاعات روز انتخابی
        window.saveTodayWorkout = async () => {
            if (!currentRoutine) return;
            showLoading(true);

            let logData = {
                routine: currentRoutine,
                exercises: {}
            };

            const exercises = workoutData[currentRoutine] || [];
            let prUpdated = false;

            exercises.forEach(ex => {
                logData.exercises[ex.id] = [];
                for (let s = 1; s <= ex.sets; s++) {
                    const w = document.getElementById(`w-${ex.id}-${s}`).value;
                    const r = document.getElementById(`r-${ex.id}-${s}`).value;
                    
                    if (w || r) {
                        const weightNum = parseFloat(w) || 0;
                        logData.exercises[ex.id].push({ w: w, r: r });

                        // چک کردن جابجایی رکورد شخصی
                        if (weightNum > (globalPrs[ex.id] || 0)) {
                            globalPrs[ex.id] = weightNum;
                            prUpdated = true;
                        }
                    }
                }
            });

            try {
                // ذخیره لاگ روزانه
                await setDoc(doc(db, "daily_logs", selectedDateStr), logData);
                
                // در صورت ارتقای رکورد، دیتابیس توتال آپدیت می‌شود
                if (prUpdated) {
                    await setDoc(doc(db, "totals", "prs"), globalPrs);
                }
                
                alert('کل برنامه و ست‌های این روز با موفقیت ثبت و سوابق بروزرسانی شد! 💪');
                await selectDate(...selectedDateStr.split('-').map(Number));
            } catch (e) {
                alert('خطا در ذخیره‌سازی، لطفاً اینترنت خود را بررسی کنید.');
                console.error(e);
            }
            showLoading(false);
        };
    </script>
</body>
</html>
